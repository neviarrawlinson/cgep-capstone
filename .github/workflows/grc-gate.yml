name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/primitives/compliant-s3

jobs:
  grc-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /tmp/tfsec
          sudo install /tmp/tfsec /usr/local/bin/tfsec
          tfsec --version

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color -var="project_name=cgep-lab" -var="environment=dev" | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        id: conftest
        if: always()
        run: |
          mkdir -p evidence

          {
            echo "["
            FIRST=1

            for ns in compliance.sc28_aws compliance.ac3_aws compliance.cm6_aws compliance.cm6; do
              if [[ $FIRST -eq 1 ]]; then
                FIRST=0
              else
                printf ","
              fi

              conftest test \
                --policy policies \
                --namespace "$ns" \
                --output=json \
                "${TF_WORKING_DIR}/plan.json" || true
            done

            echo "]"
          } > evidence/conftest-results.json

          python3 - <<'PY'
          import json
          import sys

          with open("evidence/conftest-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          failures = 0
          for result_group in data:
              for result in result_group:
                  failures += len(result.get("failures") or [])

          print(f"conftest failures: {failures}")
          sys.exit(0 if failures == 0 else 1)
          PY

      - name: tfsec scan
        id: tfsec
        if: always()
        run: |
          mkdir -p evidence

          tfsec "${TF_WORKING_DIR}" --format sarif --out evidence/tfsec.sarif || true

          python3 - <<'PY'
          import json
          import sys

          with open("evidence/tfsec.sarif", "r", encoding="utf-8") as f:
              data = json.load(f)

          high = 0
          for run in data.get("runs", []):
              for result in run.get("results", []):
                  level = (result.get("level") or "").lower()
                  if level in ("error", "critical", "high"):
                      high += 1

          print(f"tfsec high+critical: {high}")
          sys.exit(0 if high == 0 else 1)
          PY

      - name: Copy Terraform plan into evidence
        if: always()
        run: |
          cp "${TF_WORKING_DIR}/plan.json" evidence/plan.json
          cp "${TF_WORKING_DIR}/plan.txt" evidence/plan.txt

      - name: Upload GRC evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90
