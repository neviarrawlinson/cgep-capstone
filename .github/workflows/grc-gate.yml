name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/primitives/compliant-s3

jobs:
  grc-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /tmp/tfsec
          sudo install /tmp/tfsec /usr/local/bin/tfsec
          tfsec --version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Terraform plan
        if: always()
        run: |
          set +e

          mkdir -p evidence/status
          TF_STATUS=0

          pushd "${TF_WORKING_DIR}"

          terraform init -input=false
          INIT_STATUS=$?
          if [[ ${INIT_STATUS} -ne 0 ]]; then
            TF_STATUS=${INIT_STATUS}
          fi

          if [[ ${TF_STATUS} -eq 0 ]]; then
            terraform validate
            VALIDATE_STATUS=$?
            if [[ ${VALIDATE_STATUS} -ne 0 ]]; then
              TF_STATUS=${VALIDATE_STATUS}
            fi
          fi

          if [[ ${TF_STATUS} -eq 0 ]]; then
            terraform plan -out=tfplan -no-color -var="project_name=cgep-lab" -var="environment=dev" | tee plan.txt
            PLAN_STATUS=${PIPESTATUS[0]}
            if [[ ${PLAN_STATUS} -ne 0 ]]; then
              TF_STATUS=${PLAN_STATUS}
            fi
          else
            touch plan.txt
          fi

          if [[ -f tfplan ]]; then
            terraform show -json tfplan > plan.json
          else
            echo "{}" > plan.json
          fi

          popd

          echo "${TF_STATUS}" > evidence/status/terraform.exit
          exit 0

      - name: Conftest policy gate
        if: always()
        run: |
          set +e

          mkdir -p evidence/status
          CONFTST_STATUS=0

          {
            echo "["
            FIRST=1

            for ns in compliance.sc28_aws compliance.ac3_aws compliance.cm6_aws compliance.cm6; do
              if [[ $FIRST -eq 1 ]]; then
                FIRST=0
              else
                printf ","
              fi

              conftest test \
                --policy policies \
                --namespace "$ns" \
                --output=json \
                "${TF_WORKING_DIR}/plan.json" || true
            done

            echo "]"
          } > evidence/conftest-results.json

          python3 - <<'PY'
          import json
          import sys

          with open("evidence/conftest-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          failures = 0
          for result_group in data:
              for result in result_group:
                  failures += len(result.get("failures") or [])

          print(f"conftest failures: {failures}")
          sys.exit(0 if failures == 0 else 1)
          PY

          CONFTST_STATUS=$?
          echo "${CONFTST_STATUS}" > evidence/status/conftest.exit
          exit 0

      - name: tfsec scan
        if: always()
        run: |
          set +e

          mkdir -p evidence/status

          tfsec "${TF_WORKING_DIR}" --format sarif --out evidence/tfsec.sarif || true

          python3 - <<'PY'
          import json
          import sys

          with open("evidence/tfsec.sarif", "r", encoding="utf-8") as f:
              data = json.load(f)

          high = 0
          for run in data.get("runs", []):
              for result in run.get("results", []):
                  level = (result.get("level") or "").lower()
                  if level in ("error", "critical", "high"):
                      high += 1

          print(f"tfsec high+critical: {high}")
          sys.exit(0 if high == 0 else 1)
          PY

          TFSEC_STATUS=$?
          echo "${TFSEC_STATUS}" > evidence/status/tfsec.exit
          exit 0

      - name: Copy Terraform plan into evidence
        if: always()
        run: |
          cp "${TF_WORKING_DIR}/plan.json" evidence/plan.json
          cp "${TF_WORKING_DIR}/plan.txt" evidence/plan.txt

      - name: Bundle, sign, and upload evidence to vault
        id: sign
        if: always()
        env:
          VAULT: ${{ vars.EVIDENCE_VAULT }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${VAULT}" ]]; then
            echo "EVIDENCE_VAULT repo variable is not set"
            exit 1
          fi

          BUNDLE="evidence-${RUN_ID}-${SHA}.tar.gz"

          tar -czf "${BUNDLE}" evidence
          sha256sum "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"

          cosign sign-blob --yes --bundle "${BUNDLE}.sig.bundle" "${BUNDLE}"

          KEY_PREFIX="runs/${RUN_ID}"

          aws s3 cp "${BUNDLE}"            "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256"     "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle" "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sig.bundle"

          VERSION_ID=$(aws s3api head-object \
            --bucket "${VAULT}" \
            --key "${KEY_PREFIX}/${BUNDLE}" \
            --query VersionId \
            --output text)

          cat > receipt.json <<EOF
          {
            "run_id": "${RUN_ID}",
            "vault": "${VAULT}",
            "bundle_key": "${KEY_PREFIX}/${BUNDLE}",
            "version_id": "${VERSION_ID}",
            "sha256": "$(cat ${BUNDLE}.sha256)",
            "commit": "${SHA}",
            "workflow": "grc-gate"
          }
          EOF

          aws s3 cp receipt.json "s3://${VAULT}/${KEY_PREFIX}/receipt.json"

          cp "${BUNDLE}" evidence/
          cp "${BUNDLE}.sha256" evidence/
          cp "${BUNDLE}.sig.bundle" evidence/
          cp receipt.json evidence/receipt.json

      - name: Upload GRC evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90

      - name: Evaluate gate outcome
        if: always()
        run: |
          set -euo pipefail

          TF_STATUS=$(cat evidence/status/terraform.exit)
          CONFTST_STATUS=$(cat evidence/status/conftest.exit)
          TFSEC_STATUS=$(cat evidence/status/tfsec.exit)

          echo "terraform status: ${TF_STATUS}"
          echo "conftest status: ${CONFTST_STATUS}"
          echo "tfsec status: ${TFSEC_STATUS}"

          if [[ "${TF_STATUS}" != "0" || "${CONFTST_STATUS}" != "0" || "${TFSEC_STATUS}" != "0" ]]; then
            echo "GRC gate failed. Evidence was still signed and uploaded."
            exit 1
          fi

          echo "GRC gate passed. Evidence chain preserved."
