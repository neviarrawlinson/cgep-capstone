name: gcp-wif-demo

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-gcp-wif:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP using Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/277725014630/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: cgep-grc-gate-sa@cge-p-sandbox.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP identity
        run: |
          gcloud config list account
          gcloud projects describe cge-p-sandbox --format=json
